<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Modern Scientific Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgb(236, 235, 161)
}
.title{
    text-align: center;
    letter-spacing: 1px;
    margin-bottom: 20px;
    width: 100%;
    font-size: 50px;
    color: white;
    font-style: italic;
}

.calculator{
    width:80vw;
    height: 90vh;
    border-radius:8px;
    padding: 50px;
    background-color: #b41e0a;
}

.display{
    width:100%;
    height:80px;
    border:none;
    outline:none;
    text-align: right;
    border-radius:6px;
    margin-bottom:20px;
    padding-right: .5em;
    font-size:2rem;
    text-align:right;
    background: rgb(240, 240, 217);
    color:black;
    box-shadow: inset 8px 8px 8px rgb(80, 80, 73),
              inset -8px -8px 8px rgb(172, 172, 161);
}                      

.buttons{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:10px;
    
}

button{
    width: 80%;
    height: 30px;
    font-size: 20px;
    
    border: none;
    outline: none;
    margin-top: 1.7em;
    margin: 5px;
    border-radius: 4px;
    box-shadow: 5px 5px 8px rgb(100, 100, 94),
                -5px -5px 8px rgb(228, 228, 214);
    display: flex;
    justify-content: center;
    flex-direction: column;
    align-items: center;
    cursor:pointer;
    transition:0.4s;
    font-style: bold;
}

button:hover{
    transform:scale(1.05);
    background:#7daff5;
}
.equal{
    background-color: rgb(6, 137, 212);
    color: black;
}

.delete{
    background-color: #c2055d;
}

.clear{
    background: rgb(11, 175, 11);
}

.clear:hover{
    background:#e73333;
}
.back-button{
    position: absolute;
    top: 0px;
    right: 50px;
    display:block;
    text-align:center;
    margin-top:20px;
    padding:10px 18px;
    background:#0eb4b9;
    color:black;
    text-decoration:none;
    border-radius:10px;
    font-weight:600;
    transition:0.3s;
    font-style: bold;
}

.back-button:hover{
    transform:scale(1.05);
}
@media(max-width:600px){

    .calculator{
        padding:15px;
        width: fit-content;
        height: fit-content;
        border-radius: 20px;
        margin-top: 70px;

    }

    button{
        height:50px;
        font-size:0.9rem;
    }

    .display{
        height:70px;
        font-size:1.5rem;
    }

}
</style>
</head>

<body>
    <a href="index.html" class="back-button">
    Back
</a>

    
        
<div class="calculator">
    <h1 class="title"> Soft Scientific Calculator </h1>


<input type="text" placeholder="0" class="display" id="display"readonly>

<div class="buttons">

<button class="delete" onclick="deleteLast()">CE</button>
<button onclick="append('x!')">x!</button>
<button onclick="append('(')">(</button>
<button onclick="append(')')">)</button>
<button onclick="append('%')">%</button>
<button class="clear" onclick="clearDisplay()">AC</button>

<button onclick="sin()">sin</button>
<button onclick="pi()">π</button>
<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('/')">÷</button>

<button onclick="cos()">cos</button>
<button onclick="log()">log</button>
<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('*')">×</button>

<button onclick="tan()">tan</button>
<button onclick="sqrt()">√</button>
<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('-')">−</button>

<button onclick="eValue()">e</button>
<button onclick="power()">xʸ</button>
<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>
<button onclick="append('+')">+</button>

</div>
</div>

<script>

let display = document.getElementById("display");

function append(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function deleteLast(){
    display.value = display.value.slice(0,-1);
}

function calculate(){
    try{
        display.value = eval(display.value);
    }
    catch{
        display.value = "Error";
    }
}

function sin(){
    display.value = Math.sin(toRadians(display.value));
}

function cos(){
    display.value = Math.cos(toRadians(display.value));
}

function tan(){
    display.value = Math.tan(toRadians(display.value));
}

function log(){
    display.value = Math.log10(display.value);
}

function ln(){
    display.value = Math.log(display.value);
}

function sqrt(){
    display.value = Math.sqrt(display.value);
}

function square(){
    display.value = Math.pow(display.value,2);
}

function power(){
    display.value += "**";
}

function pi(){
    display.value += Math.PI.toFixed(8);
}

function eValue(){
    display.value += Math.E.toFixed(8);
}

function factorial(){
    let n = parseInt(display.value);
    let fact = 1;

    if(n < 0){
        display.value = "Error";
        return;
    }

    for(let i=1;i<=n;i++){
        fact *= i;
    }

    display.value = fact;
}

function toRadians(degree){
    return degree * (Math.PI/180);
}

</script>

</body>
</html>
